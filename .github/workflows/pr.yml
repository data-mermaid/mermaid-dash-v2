name: PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
      - develop

permissions:
  contents: read
  issues: write
  pull-requests: write
  id-token: write

jobs:
  build:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.2.0
        with:
          node-version-file: '.nvmrc'

      - uses: actions/cache@v5.0.3
        id: yarn-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - if: ${{ steps.yarn-cache.outputs.cache-hit != 'true' }}
        name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn run build

  cdk-nag:
    if: github.event.pull_request.draft == false
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.2.0
        with:
          node-version-file: '.nvmrc'

      # cdk synth needs a dist/ dir for the S3 asset source;
      # a placeholder is sufficient since cdk-nag only validates constructs.
      - name: Create placeholder dist directory
        run: mkdir -p dist && echo '<!doctype html>' > dist/index.html

      - name: Fetch iac node cache
        uses: actions/cache@v5.0.3
        id: iac-cache
        with:
          path: iac/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('iac/package-lock.json') }}

      - name: Install IaC dependencies
        if: ${{ steps.iac-cache.outputs.cache-hit != 'true' }}
        working-directory: iac
        run: npm ci

      - name: CDK Nag
        id: cdk-nag
        working-directory: iac
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT}}
          CDK_DEFAULT_REGION: ${{ secrets.CDK_DEFAULT_REGION }}
        run: |
          set +e
          npx cdk synth --quiet 2>&1 | tee /tmp/cdk-nag.log
          synth_exit=${PIPESTATUS[0]}
          set -e

          if grep -q '^\[Error' /tmp/cdk-nag.log; then
            echo "has_errors=true" >> "$GITHUB_OUTPUT"
          elif [ "$synth_exit" -ne 0 ]; then
            echo "::error::cdk synth failed with exit code $synth_exit (not a cdk-nag finding)"
            exit "$synth_exit"
          else
            echo "has_errors=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post CDK Nag results to PR
        if: always() && steps.cdk-nag.conclusion != 'skipped'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/cdk-nag.log', 'utf8');
            const errors = log.split('\n').filter(l => l.startsWith('[Error'));
            const warnings = log.split('\n').filter(l => l.startsWith('[Warning'));
            let body = '## cdk-nag report\n\n';
            if (errors.length === 0) {
              body += ':white_check_mark: **No unsuppressed errors.**\n';
            } else {
              body += `:x: **${errors.length} unsuppressed error(s):**\n\n`;
              body += '```\n' + errors.join('\n') + '\n```\n';
            }
            if (warnings.length > 0) {
              body += `\n:warning: ${warnings.length} warning(s)\n`;
            }
            body += '\n---\n*See `iac/nag-suppressions.ts` to add suppressions for accepted risks.*';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body.includes('## cdk-nag report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on CDK Nag errors
        if: steps.cdk-nag.outputs.has_errors == 'true'
        run: |
          echo "::error::cdk-nag found unsuppressed errors — see PR comment for details"
          exit 1

  cdk-diff:
    if: github.event.pull_request.draft == false
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.2.0
        with:
          node-version-file: '.nvmrc'

      - name: Create placeholder dist directory
        run: mkdir -p dist && echo '<!doctype html>' > dist/index.html

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
          DEPLOY_AWS_ROLE: ${{ secrets.DEPLOY_AWS_ROLE }}
        with:
          role-to-assume: arn:aws:iam::${{ secrets.CDK_DEFAULT_ACCOUNT }}:role/${{ secrets.DEPLOY_AWS_ROLE }}
          aws-region: us-east-1
          role-skip-session-tagging: true

      - name: Fetch iac node cache
        uses: actions/cache@v5.0.3
        id: iac-cache
        with:
          path: iac/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('iac/package-lock.json') }}

      - name: Install IaC dependencies
        if: ${{ steps.iac-cache.outputs.cache-hit != 'true' }}
        working-directory: iac
        run: npm ci

      - name: CDK Diff
        id: cdk-diff
        working-directory: iac
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
          CDK_DEFAULT_REGION: ${{ secrets.CDK_DEFAULT_REGION }}
        run: |
          set +e
          npx cdk diff 2>&1 | sed 's/\x1b\[[0-9;]*[mGKHF]//g' | tee /tmp/cdk-diff.log
          echo "cdk_exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e

      - name: Post CDK diff to PR
        if: always() && steps.cdk-diff.conclusion != 'skipped'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/cdk-diff.log', 'utf8').trim();
            const noChanges = raw.includes('There were no differences');
            const MAX = 60000;
            const diff = raw.length > MAX ? raw.slice(0, MAX) + '\n…(truncated — see full log in Actions)' : raw;

            let body = '## cdk diff\n\n';
            if (noChanges) {
              body += ':white_check_mark: **No infrastructure changes.**\n';
            } else {
              body += ':memo: **Infrastructure changes detected:**\n\n';
              body += '<details>\n<summary>Show diff</summary>\n\n```\n' + diff + '\n```\n</details>\n';
            }
            body += `\n---\n*Updated for commit \`${{ github.sha }}\`*`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body.includes('## cdk diff'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
